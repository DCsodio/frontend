<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — HEXA 64</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-header">
    <img src="img/logoHEXA64.jpg" alt="HEXA 64">
    <h1>HEXA 64</h1>
    <p>Panel de monitoreo</p>
  </div>

  <div class="login-card">
    <div class="auth-tabs">
      <button class="auth-tab is-active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- Login form -->
    <div id="panel-login" class="form-panel is-active">
      <div class="input-wrapper">
        <label class="field-label">Usuario</label>
        <span class="input-icon mdi mdi-account"></span>
        <input id="login-username" type="text" class="auth-input" placeholder="tu usuario" autocomplete="username">
      </div>
      <div class="input-wrapper">
        <label class="field-label">Contraseña</label>
        <span class="input-icon mdi mdi-lock"></span>
        <input id="login-password" type="password" class="auth-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" onclick="doLogin(this)">
        <span class="mdi mdi-login"></span> Entrar
      </button>
      <div id="login-msg" class="auth-message"></div>
    </div>

    <!-- Register form -->
    <div id="panel-register" class="form-panel">
      <div class="input-wrapper">
        <label class="field-label">Usuario</label>
        <span class="input-icon mdi mdi-account-plus"></span>
        <input id="reg-username" type="text" class="auth-input" placeholder="mínimo 3 caracteres" autocomplete="username">
      </div>
      <div class="input-wrapper">
        <label class="field-label">Contraseña</label>
        <span class="input-icon mdi mdi-lock-plus"></span>
        <input id="reg-password" type="password" class="auth-input" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="input-wrapper">
        <label class="field-label">Repetir contraseña</label>
        <span class="input-icon mdi mdi-lock-check"></span>
        <input id="reg-password2" type="password" class="auth-input" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="input-wrapper">
        <label class="field-label">ID del dispositivo (ESP32)</label>
        <div class="iconochip"><span class="input-icon mdi mdi-chip"></span></div>
        <input id="reg-device-id" type="text" class="auth-input" placeholder="ej: ESP32-001" autocomplete="off">
        <p class="input-hint">Ingresá el ID único de tu dispositivo. Solo verás los datos de ese sensor.</p>
      </div>
      <button class="btn-submit" onclick="doRegister(this)">
        <span class="mdi mdi-account-check"></span> Crear cuenta
      </button>
      <div id="register-msg" class="auth-message"></div>
    </div>
  </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
