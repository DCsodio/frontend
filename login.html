<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — HEXA 64</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-header">
    <img src="img/logoHEXA64.jpg" alt="HEXA 64">
    <h1>HEXA 64</h1>
    <p>Panel de monitoreo</p>
  </div>

  <div class="login-card">
    <div class="auth-tabs">
      <button class="auth-tab is-active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- Login form -->
    <div id="panel-login" class="form-panel is-active">
      <div class="input-wrapper">
        <label class="field-label">Usuario</label>
        <span class="input-icon mdi mdi-account"></span>
        <input id="login-username" type="text" class="auth-input" placeholder="tu usuario" autocomplete="username">
      </div>
      <div class="input-wrapper">
        <label class="field-label">Contraseña</label>
        <span class="input-icon mdi mdi-lock"></span>
        <input id="login-password" type="password" class="auth-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" onclick="doLogin(this)">
        <span class="mdi mdi-login"></span> Entrar
      </button>
      <div id="login-msg" class="auth-message"></div>
    </div>

    <!-- Register form -->
    <div id="panel-register" class="form-panel">
      <div class="input-wrapper">
        <label class="field-label">Usuario</label>
        <span class="input-icon mdi mdi-account-plus"></span>
        <input id="reg-username" type="text" class="auth-input" placeholder="mínimo 3 caracteres" autocomplete="username">
      </div>
      <div class="input-wrapper">
        <label class="field-label">Contraseña</label>
        <span class="input-icon mdi mdi-lock-plus"></span>
        <input id="reg-password" type="password" class="auth-input" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="input-wrapper">
        <label class="field-label">Repetir contraseña</label>
        <span class="input-icon mdi mdi-lock-check"></span>
        <input id="reg-password2" type="password" class="auth-input" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="input-wrapper">
        <label class="field-label">ID del dispositivo (ESP32)</label>
        <div class="iconochip"><span class="input-icon mdi mdi-chip"></span></div>  
        <input id="reg-device-id" type="text" class="auth-input" placeholder="ej: ESP32-001" autocomplete="off">
        <p class="input-hint">Ingresá el ID único de tu dispositivo. Solo verás los datos de ese sensor.</p>
      </div>
      <button class="btn-submit" onclick="doRegister(this)">
        <span class="mdi mdi-account-check"></span> Crear cuenta
      </button>
      <div id="register-msg" class="auth-message"></div>
    </div>
  </div>
</div>

<script>
  var API = "https://backend-ff8w.onrender.com";

  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }

  function switchTab(tab) {
    var allTabs = document.querySelectorAll('.auth-tab');
    var allPanels = document.querySelectorAll('.form-panel');

    allTabs.forEach(function(t) { t.classList.remove('is-active'); });
    allPanels.forEach(function(p) { p.classList.remove('is-active'); });

    document.getElementById('panel-' + tab).classList.add('is-active');
    allTabs[tab === 'login' ? 0 : 1].classList.add('is-active');

    clearMessages();
  }

  function showMessage(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'auth-message ' + (type === 'error' ? 'is-error' : 'is-success');
  }

  function clearMessages() {
    document.querySelectorAll('.auth-message').forEach(function(el) {
      el.className = 'auth-message';
      el.textContent = '';
    });
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.7' : '1';
  }

  function doLogin(btn) {
    var username = document.getElementById('login-username').value.trim();
    var password = document.getElementById('login-password').value;

    if (!username || !password) {
      showMessage('login-msg', 'Completá todos los campos', 'error');
      return;
    }

    setLoading(btn, true);

    fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(res) {
      return res.json().then(function(data) { return { ok: res.ok, data: data }; });
    })
    .then(function(result) {
      if (result.ok) {
        localStorage.setItem('token', result.data.access_token);
        localStorage.setItem('username', username);
        showMessage('login-msg', '✓ Bienvenido, redirigiendo...', 'success');
        setTimeout(function() { window.location.href = 'index.html'; }, 800);
      } else {
        showMessage('login-msg', result.data.detail || 'Error al iniciar sesión', 'error');
        setLoading(btn, false);
      }
    })
    .catch(function() {
      showMessage('login-msg', 'No se pudo conectar con el servidor', 'error');
      setLoading(btn, false);
    });
  }

  function doRegister(btn) {
    var username = document.getElementById('reg-username').value.trim();
    var password = document.getElementById('reg-password').value;
    var password2 = document.getElementById('reg-password2').value;
    var deviceId = document.getElementById('reg-device-id').value.trim();

    if (!username || !password || !password2 || !deviceId) {
      showMessage('register-msg', 'Completá todos los campos', 'error');
      return;
    }
    if (username.length < 3) {
      showMessage('register-msg', 'El usuario debe tener al menos 3 caracteres', 'error');
      return;
    }
    if (password.length < 6) {
      showMessage('register-msg', 'La contraseña debe tener al menos 6 caracteres', 'error');
      return;
    }
    if (password !== password2) {
      showMessage('register-msg', 'Las contraseñas no coinciden', 'error');
      return;
    }

    setLoading(btn, true);

    fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password, device_id: deviceId })
    })
    .then(function(res) {
      return res.json().then(function(data) { return { ok: res.ok, data: data }; });
    })
    .then(function(result) {
      if (result.ok) {
        showMessage('register-msg', '✓ Cuenta creada. Podés iniciar sesión.', 'success');
        setLoading(btn, false);
        setTimeout(function() { switchTab('login'); }, 1500);
      }else {
        // 1. Intentamos obtener el mensaje del primer error de la lista
        var errorMsg = 'Error al registrarse';
        
        if (result.data && Array.isArray(result.data.detail)) {
          // Accedemos al primer error [0] y a su propiedad .msg
          // Usamos .replace para quitar el feo "Value error, " que agrega Pydantic
          errorMsg = result.data.detail[0].msg.replace('Value error, ', '');
        } else if (typeof result.data.detail === 'string') {
          // Por si el backend devuelve un error simple
          errorMsg = result.data.detail;
        }

        showMessage('register-msg', errorMsg, 'error');
        setLoading(btn, false);
      }
    })
    .catch(function() {
      showMessage('register-msg', 'No se pudo conectar con el servidor', 'error');
      setLoading(btn, false);
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    var activePanel = document.querySelector('.form-panel.is-active');
    if (activePanel.id === 'panel-login') doLogin(activePanel.querySelector('.btn-submit'));
    else doRegister(activePanel.querySelector('.btn-submit'));
  });
</script>

</body>
</html>
